name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m unittest discover -s tests
      - run: python3 skills/ai-commit-discipline/scripts/validate_commit_message.py tests/fixtures/valid_commit.txt
